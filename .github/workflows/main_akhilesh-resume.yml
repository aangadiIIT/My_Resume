# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - akhilesh-resume

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          cache: "npm"

      - name: Cache AI Model Weights
        id: cache-models
        uses: actions/cache@v4
        with:
          path: ./models
          key: v1-llama-3.2-1b-${{ runner.os }}
          restore-keys: |
            v1-llama-3.2-1b-

      - name: Install dependencies, Warmup AI & Run Tests
        run: |
          npm install
          if [ "${{ steps.cache-models.outputs.cache-hit }}" != "true" ]; then
            npm run warmup
          else
            echo "Model weights found in cache. Skipping download."
          fi
          npx playwright install --with-deps
          npm test
          npm run build --if-present

      - name: Create .env for Deployment
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Zip artifact for deployment
        run: zip -r release.zip . -x "models/*" "test-results/*" ".git/*" "playwright-report/*" ".gemini/*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "Production"
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: "Deploy to Azure Web App"
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "akhilesh-resume"
          slot-name: "Production"
          package: release.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DDCCD8B250364A4B8741409111F215B6 }}
