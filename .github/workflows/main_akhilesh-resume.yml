# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - akhilesh-resume

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Cache AI Model Weights
        id: cache-models
        uses: actions/cache@v4
        with:
          path: ./models
          key: v1-llama-3.2-1b-${{ runner.os }}
          restore-keys: |
            v1-llama-3.2-1b-

      - name: Install dependencies, Warmup AI & Run Tests
        env:
          # Give Llama 5 minutes on slow CI CPU runners (production stays at 2 min).
          TEST_SSE_TIMEOUT_MS: 300000
        run: |
          npm install
          if [ "${{ steps.cache-models.outputs.cache-hit }}" != "true" ]; then
            npm run warmup
          else
            echo "Model weights found in cache. Skipping download."
          fi
          node scripts/update-summary.js
          npx playwright install --with-deps
          npm test
          npm run build --if-present

      - name: Create .env for Deployment
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"                         >> .env
          echo "NODE_ENV=production"                                                  >> .env
          echo "GOOGLE_FORM_URL=${{ secrets.GOOGLE_FORM_URL }}"                       >> .env
          echo "GOOGLE_FORM_ENTRY_NAME=${{ secrets.GOOGLE_FORM_ENTRY_NAME }}"         >> .env
          echo "GOOGLE_FORM_ENTRY_EMAIL=${{ secrets.GOOGLE_FORM_ENTRY_EMAIL }}"       >> .env
          echo "GOOGLE_FORM_ENTRY_SUBJECT=${{ secrets.GOOGLE_FORM_ENTRY_SUBJECT }}"   >> .env
          echo "GOOGLE_FORM_ENTRY_RATING=${{ secrets.GOOGLE_FORM_ENTRY_RATING }}"     >> .env
          echo "GOOGLE_FORM_ENTRY_MESSAGE=${{ secrets.GOOGLE_FORM_ENTRY_MESSAGE }}"   >> .env
          # ADMIN_API_KEY intentionally omitted — setting it blocks the metrics widget
          # (browsers don't send custom auth headers on plain fetch requests)

      - name: Zip artifact for deployment
        run: zip -r release.zip . -x "models/*" "test-results/*" ".git/*" "playwright-report/*" ".gemini/*" ".env.example"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "Production"
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: "Nuclear VFS Purge & Restart"
        run: |
          PROFILE='${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DDCCD8B250364A4B8741409111F215B6 }}'
          USER_NAME=$(echo "$PROFILE" | grep -o 'userName="[^"]*"' | head -1 | cut -d'"' -f2)
          USER_PWD=$(echo "$PROFILE" | grep -o 'userPWD="[^"]*"' | head -1 | cut -d'"' -f2)
          SCM_URL="https://akhilesh-resume.scm.azurewebsites.net"

          echo "🔥 Nuclear Option: Wiping server-side wwwroot to break all locks..."
          curl -X DELETE -u "$USER_NAME:$USER_PWD" "$SCM_URL/api/vfs/site/wwwroot/?recursive=true"

          echo "🚀 Triggering forced server-side restart..."
          curl -X POST -u "$USER_NAME:$USER_PWD" "$SCM_URL/api/operations/restart"

          echo "⏳ Waiting 60 seconds for cold-start and sync..."
          sleep 60

      - name: "Deploy to Azure Web App"
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "akhilesh-resume"
          slot-name: "Production"
          package: release.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DDCCD8B250364A4B8741409111F215B6 }}
